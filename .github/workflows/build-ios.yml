name: Build XGO iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: List available Xcode versions
      run: ls /Applications/ | grep Xcode

    - name: Select Xcode
      run: |
        # Use latest available Xcode
        XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
        echo "Using: $XCODE_PATH"
        sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
        xcodebuild -version

    - name: Install CocoaPods
      run: |
        gem install cocoapods
        pod install --repo-update

    - name: List schemes
      run: |
        xcodebuild -workspace xgo.xcworkspace -list

    - name: Build app (unsigned - for testing)
      run: |
        xcodebuild \
          -workspace xgo.xcworkspace \
          -scheme xgo \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" \
          COMPILER_INDEX_STORE_ENABLE=NO \
          build 2>&1 | tail -100

    - name: Upload build artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: xgo-ios-build
        path: build/Build/Products/Release-iphonesimulator/
        retention-days: 30

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build/Logs/
        retention-days: 7
